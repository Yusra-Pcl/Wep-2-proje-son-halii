{% extends 'kulucka/base.html' %}

{% block title %}Ürünü Düzenle | Zanaat-AI{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4 border">
                <h4 class="fw-bold text-dark mb-3"><i class="bi bi-pencil-square text-warning me-2"></i>Ürün Bilgilerini Güncelle</h4>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary mb-1">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex gap-2 mt-4">
                        <a href="{% url 'kulucka:profil' %}" class="btn btn-sm btn-light rounded-pill px-4 w-50">İptal Et</a>
                        <button type="submit" class="btn btn-sm btn-dark rounded-pill px-4 w-50">Değişiklikleri Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    input[type="text"], input[type="number"], select, textarea {
        display: block; width: 100%; padding: 0.375rem 0.75rem; font-size: 1rem; color: #212529; background-color: #fff; border: 1px solid #ced4da; border-radius: 0.375rem;
    }
</style>
{% endblock %}
